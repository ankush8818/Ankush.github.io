<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Dashboard | Dr. Ankush Kapoor</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        .search-box {
            width: 100%;
            padding: 12px 20px;
            margin: 10px 0 25px 0;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }
        .search-box:focus {
            border-color: var(--secondary-color);
            outline: none;
            box-shadow: 0 0 8px rgba(38, 208, 206, 0.3);
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            background: white;
        }
        #attendanceTable {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
        }
        #attendanceTable th, #attendanceTable td {
            padding: 12px 15px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
            border-right: 1px solid #e2e8f0;
            font-size: 0.95rem;
        }
        #attendanceTable th {
            background-color: var(--primary-color);
            color: white;
            font-weight: 600;
        }
        #attendanceTable tr:nth-child(even) { background-color: #f8fafc; }
        #attendanceTable tr:hover { background-color: #f1f5f9; transition: background 0.2s; }
        
        .student-info {
            position: sticky;
            left: 0;
            background-color: white;
            z-index: 1;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }
        #attendanceTable th.student-info {
            background-color: var(--primary-color);
            z-index: 2;
        }
        #attendanceTable tr:nth-child(even) td.student-info { background-color: #f8fafc; }
        
        .low-att {
            background-color: #ffeef0 !important;
            color: #d8000c;
            font-weight: bold;
        }
        #status-message {
            text-align: center;
            font-weight: bold;
            color: var(--primary-color);
            padding: 20px;
        }
    </style>
</head>
<body>

    <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="courses.html">Courses</a>
        <a href="attendance.html" class="active">Attendance</a>
        <a href="feedback.html">Feedback</a>
        <a href="gen-ai-reflections.html">AI Reflections</a>
    </nav>

    <header style="padding: 3rem 2rem; border-bottom: 5px solid var(--accent-color);">
        <h1 style="font-size: 2.5rem;">Comprehensive Attendance Dashboard</h1>
        <h2>Lecture & Lab Data (VLSI, EMMI, Fiber Optics, Mini Projects)</h2>
    </header>

    <div class="container">
        <div class="about-card">
            
            <input type="text" id="searchInput" class="search-box" placeholder="Search by Student Name or Roll Number..." onkeyup="filterTable()">

            <div id="status-message">Loading all columns...</div>

            <div class="table-wrapper">
                <table id="attendanceTable">
                    <thead id="tableHeader"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Dr. Ankush Kapoor. All rights reserved.</p>
        <p style="font-size: 0.9rem; color: #cbd5e1;">ABVGIET, Pragatinagar, Shimla (H.P.)</p>
    </footer>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqAd3c4bG0GrAj6ypKV8elGH0OhNNvDuwkANnZD-WMC05bxddgN8bG16RxeN3ah5hgKERoM9qqwmSw/pub?gid=358740635&single=true&output=csv";

        async function init() {
            try {
                const response = await fetch(csvUrl);
                const text = await response.text();
                const rows = text.split(/\r?\n/).map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));

                if (rows.length < 2) return;

                const row1 = rows[0]; 
                const row2 = rows[1]; 
                
                let combinedHeader = [];
                for(let i=0; i < row2.length; i++) {
                    let top = row1[i] ? row1[i].replace(/"/g, '').trim() : "";
                    let bottom = row2[i] ? row2[i].replace(/"/g, '').trim() : "";
                    combinedHeader.push(top && bottom && top !== bottom ? `${top}<br><small>${bottom}</small>` : (top || bottom));
                }

                renderTable(combinedHeader, rows.slice(2));
                document.getElementById('status-message').style.display = 'none';
            } catch (e) {
                document.getElementById('status-message').innerHTML = "Error loading columns. Check Sheet visibility.";
                console.error("Fetch error: ", e);
            }
        }

        function renderTable(headers, data) {
            const headArea = document.getElementById('tableHeader');
            const bodyArea = document.getElementById('tableBody');

            headArea.innerHTML = `<tr>${headers.map((h, i) => `<th class="${i < 2 ? 'student-info' : ''}">${h}</th>`).join('')}</tr>`;

            let bodyHtml = '';
            data.forEach(row => {
                if (row.length < 2) return;
                
                bodyHtml += '<tr>';
                row.forEach((cell, index) => {
                    let cleanCell = cell.replace(/"/g, '').trim();
                    let cssClass = index < 2 ? 'student-info' : '';
                    
                    if (cleanCell.includes('%')) {
                        let val = parseFloat(cleanCell);
