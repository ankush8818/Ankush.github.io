<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Dashboard | Dr. Ankush Kapoor</title>
    <style>
        :root {
            --primary-color: #1A2980; 
            --secondary-color: #26D0CE; 
            --accent-color: #FF416C; 
            --bg-color: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; }
        
        nav { background: var(--primary-color); padding: 1rem; text-align: center; }
        nav a { color: white; text-decoration: none; font-weight: bold; margin: 0 15px; padding: 8px 15px; border-radius: 5px; }

        .container { max-width: 1100px; margin: 2rem auto; padding: 0 20px; }
        
        .header-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 8px solid var(--primary-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .table-wrapper { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            overflow-x: auto; 
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; color: var(--primary-color); padding: 15px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px 15px; border-bottom: 1px solid #edf2f7; font-size: 0.95rem; }
        
        .low-attendance {
            background-color: #fff5f5 !important;
            color: #c53030 !important;
            font-weight: bold;
        }

        #status-message { text-align: center; padding: 20px; font-weight: bold; color: var(--primary-color); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Main Portfolio</a>
        <a href="attendance.html">Attendance View</a>
    </nav>

    <div class="container">
        <div class="header-card">
            <h1 style="margin:0; color: var(--primary-color);">Attendance Dashboard</h1>
            <p>Real-time data from Google Sheets</p>
        </div>

        <input type="text" id="searchInput" class="search-box" placeholder="Search by name or roll number..." onkeyup="filterTable()">

        <div id="status-message">Initializing Connection...</div>

        <div class="table-wrapper">
            <table id="attendanceTable" style="display:none;">
                <thead id="tableHeader"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqAd3c4bG0GrAj6ypKV8elGH0OhNNvDuwkANnZD-WMC05bxddgN8bG16RxeN3ah5hgKERoM9qqwmSw/pub?gid=358740635&single=true&output=csv";

        async function init() {
            const status = document.getElementById('status-message');
            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.text();
                // Regex to handle CSV lines properly including those with quotes/commas inside cells
                const rows = data.split(/\r?\n/).map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                });

                if (rows.length < 1) {
                    status.innerText = "Sheet is empty.";
                    return;
                }

                renderTable(rows);
                status.style.display = 'none';
                document.getElementById('attendanceTable').style.display = 'table';
            } catch (error) {
                console.error(error);
                status.innerText = "Error: Data could not be loaded. Please ensure the sheet is published to web as CSV.";
                status.style.color = "red";
            }
        }

        function renderTable(rows) {
            const header = rows[0];
            const headerRow = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');
            
            // Find Attendance Column (usually contains % or 'Att')
            const attIndex = header.findIndex(h => h.toLowerCase().includes('attendance') || h.includes('%'));

            // Build Header
            let hHtml = '<tr>';
            header.forEach(cell => {
                hHtml += `<th>${cell.replace(/"/g, '').trim()}</th>`;
            });
            hHtml += '</tr>';
            headerRow.innerHTML = hHtml;

            // Build Body
            let bHtml = '';
            for (let i = 1; i < rows.length; i++) {
                if (rows[i].length < header.length) continue; // Skip empty rows

                let rowClass = "";
                if (attIndex !== -1) {
                    const attValue = parseFloat(rows[i][attIndex].replace(/[^\d.-]/g, ''));
                    if (!isNaN(attValue) && attValue < 75) {
                        rowClass = 'class="low-attendance"';
                    }
                }

                bHtml += `<tr ${rowClass}>`;
                rows[i].forEach(cell => {
                    bHtml += `<td>${cell.replace(/"/g, '').trim()}</td>`;
                });
                bHtml += '</tr>';
            }
            body.innerHTML = bHtml;
        }

        function filterTable() {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const rows = document.getElementById("tableBody").getElementsByTagName("tr");
            for (let row of rows) {
                row.style.display = row.textContent.toLowerCase().includes(input) ? "" : "none";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
